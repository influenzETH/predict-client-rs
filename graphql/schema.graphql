type Account {
  walletId: ID!
  name: String
  description: String
  address: Address!
  imageUrl: String
  imageStatus: ImageStatus!
  twitterUsername: String
  """
  Hidden until the account has completed deposit validation.
  """
  referralCode: String
  hasOnboarded: Boolean!
  allocationWallet: Address
  smartWalletPointsOperatorSet: Boolean!
  updatedAt: DateTime
  createdAt: DateTime
  lastLoginAt: DateTime
  """
  Maker fee discount in basis points this account receives due to volume
  tier or special programme membership. `0` for most accounts.
  """
  feeDiscountBps: Int!
  """
  Multiplier applied to points earned on each trade (default `1.0`).
  Elevated for accounts in promotional programmes.
  """
  pointsEarningRatio: Float!
  """
  Broker account when this wallet trades through a broker programme.
  """
  broker: Account
  brokerRatio: Float
  """
  Paginated list of open and historical orders placed by this account.
  """
  orders(filter: OrderFilterInput, pagination: ForwardPaginationInput): OrderConnection!
  """
  Paginated raw order-event log entries for this account (fills, cancels).
  """
  ordersEventLog(
    filter: OrderEventLogFilterInput
    pagination: ForwardPaginationInput
  ): OrderEventLogConnection!
  """
  Paginated list of positions (outcome-token holdings) for this account.

  Supports `AMOUNT_DESC` (default), `SHARES_VALUE_DESC`,
  `MARKET_QUESTION_ASC`, and `MARKET_QUESTION_DESC` sort orders.
  `RETURN_DESC` currently falls back to `AMOUNT_DESC`.

  `categoryId` is applied as a filter when provided.
  """
  positions(
    filter: PositionFilterInput
    pagination: ForwardPaginationInput
    sort: PositionSort
  ): PositionConnection!
  """
  Positions that are eligible to be claimed (resolved markets where this
  account holds winning shares).
  """
  claimablePositions: PositionConnection!
  """
  Positions in fully settled markets that can be cleared from the
  account's history (resolved markets where the held outcome lost).
  """
  clearablePositions: PositionConnection!
  """
  Earned and claimed badges for this account.
  """
  badges(
    filter: AccountBadgeFilterInput
    pagination: ForwardPaginationInput
  ): AccountBadgeConnection!
  """
  Paginated OAuth sessions authorised by this account.
  """
  oauthSessions(pagination: ForwardPaginationInput): OAuthSessionConnection!
  """
  Weekly points breakdown history for this account.
  """
  weeklyPointsHistory: [WeeklyPointsBreakdown!]!
  """
  Per-account leaderboard position. Returns `null` when the account
  has not yet accumulated any points.
  """
  leaderboard: AccountLeaderboard
  """
  Per-account aggregate statistics (PnL, volume, position value).
  """
  statistics: AccountStatistics
  """
  Referral programme statistics.
  """
  referralStatistics: ReferralStatistics!
  """
  Account that referred this user, if any.
  """
  referrer: Account
  """
  Paginated list of accounts referred by this account.
  """
  referrals(pagination: ForwardPaginationInput): AccountConnection!
  """
  PnL timeseries for this account. The granularity is chosen
  automatically based on the requested interval.
  """
  pnlTimeseries(
    filter: TimeseriesFilterInput!
    pagination: ForwardPaginationInput
  ): TimeseriesEntryConnection!
  """
  GTM wallet reward data for this account.
  """
  gtm: GtmWallet
  """
  Whether this account has a validated deposit on record.
  """
  isValidatedDeposit: Boolean
}

