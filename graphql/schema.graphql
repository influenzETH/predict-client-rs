"""
A prediction-market category that groups one or more related markets
around a single event or topic (e.g. "2024 US Presidential Election").

`Category` is a GraphQL interface. The concrete type returned depends on
`marketVariant`:
- `DEFAULT` → `DefaultCategory`
- `SPORTS_MATCH` → `SportsMatchCategory`
- `SPORTS_TEAM_MATCH` → `SportsTeamMatchCategory`
- `CRYPTO_UP_DOWN` → `CryptoUpDownCategory`
- `TWEET_COUNT` → `TweetCountCategory`

The `id` field is the human-readable slug, enabling stable URLs of the
form `/category/<slug>`.
"""
interface Category {
  id: ID!
  slug: String!
  title: String!
  titleTranslationKey: String
  description: String
  imageUrl: String!
  mobileImageUrl: String!
  videoUri: String
  onChainId: BigIntString
  status: CategoryStatus!
  marketVariant: MarketVariant!
  resolutionProvider: ResolutionProvider!
  isNegRisk: Boolean!
  isYieldBearing: Boolean!
  decimalPrecision: Int!
  conversionFeeBps: Int
  featuredOrder: Int
  overrideImageUrl: String
  holdersCount: BigIntString!
  startsAt: DateTime!
  endsAt: DateTime
  createdAt: DateTime!
  isBookmarkedByUser: Boolean!
  statistics: CategoryStatistics!
  tags(pagination: ForwardPaginationInput): CategoryTagConnection!
  markets(filter: CategoryMarketsFilterInput, pagination: ForwardPaginationInput): MarketConnection!
  comments(
    pagination: ForwardPaginationInput
    sortBy: CommentSortBy
    onlyHolders: Boolean
  ): CommentConnection!
  similarCategories(pagination: ForwardPaginationInput): CategoryConnection!
  timeseries(filter: TimeseriesFilterInput!, pagination: ForwardPaginationInput): TimeseriesConnection!
}

"""
A paginated connection over a list of nodes.
"""
type CategoryConnection {
  edges: [CategoryEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

"""
A single edge in a paginated connection, pairing a cursor with a node.
"""
