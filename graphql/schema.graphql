  referralCodeExists(referralCode: String!): Boolean!
  """
  Check whether the given address has a pending or unclaimed GTM
  (Go-To-Market) reward.

  Returns `false` for unknown addresses or addresses with no GTM record.
  """
  hasGtmPoints(address: Address!): Boolean!
  """
  Check whether the given address belongs to an API-tier user.

  API users are granted elevated rate limits. Returns `false` for unknown
