type Query {
  """
  Platform-wide aggregate statistics. Returns a single object
  containing all headline metrics for the platform.
  """
  statistics: Statistics!
  """
  Per-account yield earnings from the protocol's fee-share programme.

  Requires authentication — scoped to the requesting wallet's earnings.
  """
  yield: Yield!
  """
  Per-account referral fee-share earnings.

  Requires authentication — scoped to the requesting wallet's earnings.
  """
  referralFeeShare: ReferralFeeShare!
  """
  Fetch a single category by its slug (the value used as `id` in list edges).
  Returns `null` if no visible, non-deleted category with that slug exists.
  """
  category(id: ID!): Category
  """
  Paginated list of all visible, non-draft categories. Defaults to the
  `MOST_POPULAR` sort, which surfaces categories with active
  fee-multiplier markets first, then falls back to a curated priority.

  The connection's `totalCount` reflects the full count matching the
  filter, regardless of the requested page size.
  """
  categories(
    filter: CategoryFilterInput
    sort: CategorySortInput
    pagination: ForwardPaginationInput
  ): CategoryConnection!
  """
  Paginated list of categories currently shown in the homepage featured carousel,
  ordered by `featured_order` ascending. Only categories with a non-null
  `featured_order` are included.
  """
  featuredCategories(pagination: ForwardPaginationInput): CategoryConnection!
  """
  Given a `market_schedule_config.slug`, returns the slug of the most recently
  generated category that was produced by that schedule config. Used by the
  frontend to redirect users from a standing schedule URL (e.g. "weekly-crypto")
  to the current live instance of that recurring category.

  Returns `null` if no matching schedule config or generated category exists.
  """
  latestCategorySlug(slug: String!): String
  """
  Paginated list of previous iterations of a recurring category, identified by
  its slug. Returns resolved categories whose slug shares the same base prefix
  (everything before the last `-`) as `category_id`, excluding the category
  itself, ordered by creation date descending.

  Returns an empty connection if the slug has no `-` separator.
  """
  previousCategories(categoryId: ID!, pagination: ForwardPaginationInput): CategoryConnection!
  """
  Top-level timeseries query. Returns per-market timeseries for a category
  identified by its slug over the requested interval. Delegates to the same
  helper as `Category.timeseries`.
  """
  timeseries(
    categoryId: ID!
    filter: TimeseriesFilterInput!
    pagination: ForwardPaginationInput
  ): TimeseriesConnection!
  """
  Fetch a single market by its numeric database ID. Returns `null` if no
  non-deleted market with that ID exists.
  """
  market(id: ID!): Market
  """
  Paginated list of markets across all categories. Supports filtering by
  category, resolution status, tag, and market variant. The total count is
  not included in the connection (use `categories` with the `markets`
  sub-resolver if you need per-category counts).
  """
  markets(
    filter: MarketFilterInput
    sort: MarketSortInput
    pagination: ForwardPaginationInput
  ): MarketConnection!
  """
  TradingView-style OHLC (Open/High/Low/Close) price feed for a given
  price feed ID and resolution.

  - `resolution`: bar size (`1s`, `1m`, `5m`, `1H`, `4H`, `1D`)
  - `toTimestamp`: Unix seconds of the rightmost bar (defaults to now)
  - `countback`: number of bars to return (max 1000)
  - `provider`: price feed provider (`PYTH` or `CHAINLINK`; defaults to `PYTH`)

  Returns an empty series for unknown feed IDs.
  """
  assetOhlc(
    priceFeedId: ID!
    resolution: OhlcResolution!
    toTimestamp: Int
    countback: Int!
    provider: PriceFeedProvider
  ): OhlcSeries!
  """
  Get tweet context for an X account by username.

  Returns the account profile, date-windowed tweet count, timeseries
  breakdown, and linked categories. Returns `null` for unknown usernames.

  `timezone` is an IANA timezone name used to bucket timeseries points;
  defaults to `"UTC"` when omitted.
  """
  tweetContextByUsername(
    username: String!
    categoryId: ID
    granularity: TweetCountGranularity!
    timezone: String
    startsAt: Timestamp!
    endsAt: Timestamp!
  ): TweetContextWithCategories
  """
  Paginated list of all tags that have been assigned to at least one
  category, ordered by tag ID ascending. Used to populate tag-filter UI
  components.

  Tags are a small, stable set in practice (typically < 50), so the
  full list can usually be fetched in a single request without
  pagination.

  When `include_hidden` is `true`, tags hidden from the public list
  are also returned.
  """
  categoryTags(pagination: ForwardPaginationInput, includeHidden: Boolean): CategoryTagConnection!
  """
  Fetches a single tag by its numeric database ID. Returns `null` if not found.
  """
  categoryTag(id: ID!): CategoryTag
  """
  Paginated global points leaderboard, ordered by total points
  descending (rank ascending). Pagination is stable as long as the
  underlying rank snapshot is not refreshed between page fetches.
  """
  leaderboard(pagination: ForwardPaginationInput): LeaderboardConnection!
  """
  Fetch a specific allocation round by its numeric ID. Returns `null` if no
  round with that ID exists.
  """
  allocationRound(id: Int!): AllocationRound
  """
  Returns the allocation round that is currently in progress — i.e.
  the one whose `[startTime, endTime]` window contains the current
  time.

  Returns `null` if no round is currently active (e.g. between rounds
  or before the first round has been created).
  """
  currentAllocationRound: AllocationRound
  """
  All allocation rounds whose `startTime` is in the past, newest first.
  """
  allocationRounds: [AllocationRound!]!
  """
  Full-text search across categories and markets.

  Results are ranked by TF-IDF relevance with fuzzy matching when the
  search service is reachable, with a substring-match fallback otherwise.

  Both `categories` and `markets` in the result respect the `pagination`
  argument independently, so a single request can retrieve up to `first`
  categories and `first` markets.
  """
  search(query: String!, filter: SearchFilterInput, pagination: ForwardPaginationInput): SearchResult!
  """
  Returns the categories and markets with the highest trending score.

  The score combines 24 h volume momentum, trade count, holder growth,
  and recency, with a fallback to raw 24 h volume when the search
  service is unavailable.
  """
  trending(pagination: ForwardPaginationInput): TrendingResult!
  """
  Paginated feed of on-chain trade fill events, ordered by time descending
  (most recent first).

