"""
A time-bounded rewards allocation round. Points accumulated within the round's
`[startTime, endTime]` window are distributed as token rewards according to
`allocationAmount`.

Rounds are created in advance by the rewards team; the current in-progress
round can be fetched with `currentAllocationRound`.
"""
type AllocationRound {
  """
  Numeric primary key. Use this as the `id` argument to `allocationRound`.
  """
  id: Int!
  """
  ISO 8601 UTC timestamp of when this round started accepting point accumulation.
  """
  startTime: DateTime!
  """
  ISO 8601 UTC timestamp of when this round closed (or will close).
  """
  endTime: DateTime!
  """
  ISO 8601 UTC timestamp of when this round record was created.
  """
  createdAt: DateTime!
  """
  Total token amount allocated across all participants in this round.
  """
  allocationAmount: Int!
  """
  The week number within the season this round belongs to.
  """
  week: Int!
}

