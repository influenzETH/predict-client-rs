"""
On-chain lifecycle status of a market.

The progression through these states roughly mirrors the UMA optimistic
oracle dispute lifecycle:

`INITIALIZING` → `INITIALIZED` → `CREATING` → `CREATED` → `REGISTERED` →
(normal close) `PRICE_PROPOSED` → `RESOLVED`
or (dispute)   `PRICE_DISPUTED` → `PRICE_PROPOSED` → …

`PAUSED` / `UNPAUSED` can occur at any point after `REGISTERED` if the
market is temporarily suspended.
"""
enum MarketStatus {
  INITIALIZING
  INITIALIZED
  CREATING
  CREATED
  REGISTERED
  PRICE_PROPOSED
  PRICE_DISPUTED
  PAUSED
  UNPAUSED
  RESOLVED
}

"""
One entry in a market's lifecycle log, recording each on-chain state transition
(e.g. open → proposed → resolved) together with the transaction details.

The `proposedOutcomeId` and `proposedOutcomeLabel` fields are only populated for
entries where the market has entered a `PROPOSED` state and a specific outcome
has been nominated for resolution.
"""
type MarketStatusLog {
  status: MarketStatus!
  """
  ISO 8601 UTC timestamp of the on-chain transaction that produced this log entry.
  """
  timestamp: DateTime!
  transactionHash: String!
  """
  Position of this log entry within its block. `null` for off-chain status
  transitions that have no block context.
  """
  logIndex: Int
  """
  Numeric ID of the outcome that was proposed for resolution. Only set for
  `PROPOSED` entries.
  """
  proposedOutcomeId: Int
  """
  Human-readable label of the proposed outcome (e.g. `"Yes"`). Only set for
  `PROPOSED` entries.
  """
  proposedOutcomeLabel: String
  """
  Identifier of the oracle service that triggered this status transition.
  """
  resolutionProviderTypeId: Int!
}

"""
A paginated connection over a list of nodes.
