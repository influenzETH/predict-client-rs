  cursor: String!
  node: Category!
}

"""
Input filter for the `categories` and `search` list queries.

`tag` and `tags` are both accepted; when `tags` is present it takes
precedence and only its first element is applied (multi-tag AND filtering
is not yet supported).
"""
input CategoryFilterInput {
  """
  Restrict to open (`OPEN`) or resolved (`RESOLVED`) categories only.
  """
  status: CategoryStatus
  """
  Restrict to categories tagged with this single tag ID.
  """
  tag: ID
  """
  Restrict to categories tagged with any of these tag IDs. Takes precedence
  over `tag` when both are supplied.
  """
  tags: [ID!]
  """
  Restrict to categories whose `ends_at` is before this Unix timestamp.
  """
  endsBefore: Timestamp
  """
  When `true`, restrict to categories bookmarked by the authenticated user.
  Silently ignored for unauthenticated requests.
  """
  bookmarked: Boolean
  """
  When `true`, restrict to GTM (Go-To-Market) eligible categories.
  """
  gtm: Boolean
  """
  When `true`, restrict to categories that have started but not yet resolved.
  """
  isLive: Boolean
}

"""
Resolution status filter for `Category.markets`.
"""
enum CategoryMarketFilterStatus {
  """
  Only markets that are not yet resolved.
  """
  OPEN
  """
  Only markets that have been resolved.
  """
  RESOLVED
}

"""
Filter input for the `Category.markets` connection.
"""
input CategoryMarketsFilterInput {
  """
  Restrict to open (`OPEN`) or resolved (`RESOLVED`) markets only.
  Omit to return all markets.
  """
  status: CategoryMarketFilterStatus
}

