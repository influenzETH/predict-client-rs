  `id` argument to the `market` query.
  """
  id: ID!
  title: String!
  titleTranslationKey: String
  question: String!
  description: String
  imageUrl: String!
  """
  Maker rebate/fee in basis points. A negative value means market makers
  receive a rebate on each matched trade (maker-rebate model).
  """
  makerFeeBps: Int!
  """
  Taker fee in basis points deducted from each matched trade.
  """
  takerFeeBps: Int!
  """
  Current on-chain market status.
  """
  status: MarketStatus!
  """
  Sort index within the parent category's ordered market list.
  """
  categoryPosition: Int!
  decimalPrecision: Int!
  """
  When `false`, order placement is disabled for this market (e.g. during
  resolution or maintenance).
  """
  isTradingEnabled: Boolean!
  """
  `true` if a fee multiplier promotion is currently active. See
  `feeMultiplierStartTime` / `feeMultiplierEndTime` for the window.
  """
  feeMultiplier: Boolean!
  """
  ISO 8601 UTC start of the fee multiplier promotion. `null` means the
  promotion applies from market open.
  """
  feeMultiplierStartTime: DateTime
  """
  ISO 8601 UTC end of the fee multiplier promotion. `null` means the promotion
  applies until market resolution.
  """
  feeMultiplierEndTime: DateTime
  """
  Whether a point-cap modifier is active for this market. When `true`, the
  maximum points a user can earn per-trade is scaled by a configured multiplier.
  """
  pointCapModifier: Boolean!
  """
  Reward timing windows for this market, ordered by start time ascending.
  Each window defines the date range and per-minute point rate.
  Returns an empty list when no reward timings have been configured.
  """
  rewardTimings: [MarketRewardTiming!]!
  """
  ISO 8601 UTC timestamp of when this market was created.
  """
  createdAt: DateTime!
  """
  UMA/Polymarket condition ID (`bytes32` hex) that uniquely identifies this
  market on-chain. Used to look up positions in the conditional token framework.
  """
  conditionId: String!
  """
  Identifier registered with the oracle for the question that resolves this
  market (e.g. a UMA ancillary data hash).
  """
  oracleQuestionId: String!
  """
  Transaction hash of the oracle question registration transaction.
  Currently always `null` — reserved for future use.
  """
  oracleTxHash: String
  """
  Ethereum address (checksummed hex) of the resolver contract that will
  settle this market on-chain.
  """
  resolverAddress: Address!
  """
  Minimum required spread before the market is considered healthy,
  returned as a decimal string to preserve precision.
  """
  spreadThreshold: BigIntString!
  """
  Minimum share volume before the market is considered active, returned
  as a decimal string to preserve precision.
  """
  shareThreshold: BigIntString!
  """
  Zero-based index of this market's binary question within its parent
  neg-risk category. For categories with a single market this is always `0`.
  `null` for markets not associated with a neg-risk category.
  """
  questionIndex: Int
  """
  Pre-computed statistics for this market.
  """
  statistics: MarketStatistics!
  """
  Implied probability of the YES outcome expressed as a percentage (0–100),
  derived from the most recent matched price. `null` for markets with no
  matched trades.
  """
  chancePercentage: Float
  """
  Live orderbook snapshot for this market. Sourced from a real-time
  cache layer, so it may lag by a few seconds.
  """
  orderbook: MarketOrderbook
  """
  Total USD liquidity within the market's configured spread window
  around the midpoint.

  `spreadThreshold` defines the full allowed window in Wei; eligible
  levels are those within `spreadThreshold / 1e18 / 2` of the midpoint.
  Returns `null` for one-sided books, unknown markets, or when
  `spreadThreshold` is unset.
  """
  nearMidpointLiquidityUsd: Float
  """
  The winning outcome for a resolved market, identified by `status = true` on
  the outcome record. Returns `null` for unresolved markets or markets with no
  outcomes.
  """
  resolution: Outcome
  """
  All outcomes (i.e. answer choices) for this market, typically `["Yes", "No"]`
  for binary markets. Outcomes are not paginated in practice — most markets
  have two.
  """
  outcomes(filter: OutcomeFilterInput): OutcomeConnection!
  """
  Historical status transitions for this market (e.g. open → proposed →
  resolved), ordered oldest-first.

  When the 3PO resolution flow has produced any log entry for this
  market, `PRICE_PROPOSED` entries from the default oracle are
  suppressed — the 3PO flow supersedes the default proposal.

  Connection pagination is nominal: the full set is always returned in a
  single page (markets accumulate at most a handful of status transitions).
  """
  statusLogs: MarketStatusLogConnection!
  """
  On-chain bulletin-board messages posted to this market, oldest first.
  """
  bulletinBoardUpdates: [BulletinBoardUpdates!]!
  """
  Authenticated view of the caller's open/matched/cancelled orders in
  this market.

  Unauthenticated requests always receive an empty connection rather
  than an auth error, so logged-out users can still render market
  detail pages without branching on auth state client-side.
  """
  orders(filter: OrderFilterInput, pagination: ForwardPaginationInput): OrderConnection!
  """
  The parent category of this market.
  """
  category: Category!
}

