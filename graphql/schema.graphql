  """
  Returns the canonical EIP-191 login message for the given Unix millisecond
  timestamp. Clients must sign this exact string and pass it unchanged to
  `login(data: { message: …, signature: … })`.

  The timestamp must be within 600 seconds of the server clock at login time.
  Generating the message and submitting the signature should happen in a
  single user interaction.
  """
  message(timestamp: Timestamp!): String!
  """
  Fetch the public profile for an Ethereum address.

  The lookup is case-sensitive on the checksummed form; returns `null`
  if no account with that address exists.
  """
  account(address: Address!): Account
  """
  Fetch the public profile by numeric wallet ID.

  Returns `null` if no account with that wallet ID exists.
  """
  walletAccount(walletId: Int!): Account
  """
  Public paginated positions for a wallet, identified by address or wallet ID.
  """
  walletPositions(
    filter: WalletPositionFilter!
    pagination: ForwardPaginationInput
  ): WalletPositionConnection!
  """
  Authenticated paginated positions for the currently logged-in wallet.
  """
  positions(pagination: ForwardPaginationInput): WalletPositionConnection!
  """
  Validate whether a candidate display name is available and meets the
  platform's naming rules (3–16 chars, alphanumeric + `_` and `-`).

  Returns `false` for names that are syntactically invalid or already
  taken by another account, `true` if the name can be claimed.
  """
  accountNameValid(name: String!): Boolean!
  """
  Check whether a referral code is currently registered to an existing
  account. A 5-character code that returns `true` here can be passed to
  `addReferrer`.
