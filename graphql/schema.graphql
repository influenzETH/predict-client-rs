  marketData: [CryptoMarketData!]!
  """
  Paginated list of previous iterations of this recurring category,
  ordered newest-first.
  """
  previousCategories(pagination: ForwardPaginationInput): CategoryConnection!
  """
  Paginated list of next (future) iterations of this recurring Chainlink category.

  Only Chainlink categories have a well-defined next iteration. For all other
  resolution providers an empty connection is returned.

