"""
Visibility state of the account's profile picture.

- `PUBLIC`: the image is visible to all users.
- `PRIVATE`: the owner has hidden the image.
- `BLOCKED`: the content-moderation pipeline marked the image as unsafe and
it has been suppressed.
"""
enum ImageStatus {
  PUBLIC
  PRIVATE
  BLOCKED
}

"""
Outcome determined by the NSFW content classifier for an uploaded image.
"""
enum ImageValidationOutcome {
  """
  Image passed all safety checks.
  """
  SAFE
  """
  Image was classified as not-safe-for-work and has been suppressed.
  """
  NSFW
  """
  The validation pipeline itself failed (e.g. network or timeout error).
  """
  FAILED
}

"""
Result of the `imageValidationStatus` query, describing the outcome of a
background NSFW-check job initiated by `uploadProfilePicture`.

The `validationJobId` is the same opaque Base64 string that
`uploadProfilePicture` returned. Poll this until `status` is `COMPLETED`
or `FAILED` before presenting the new image to other users.
"""
type ImageValidationStatus {
  """
  The opaque job identifier originally returned by `uploadProfilePicture`.
  """
  validationJobId: String!
  """
  Current lifecycle state of the validation job.
  """
  status: ValidationJobStatus!
  """
  Safety classification determined by the validator, if the job has
  finished. `null` while the job is still `PENDING` or `STARTED`.
  """
  outcome: ImageValidationOutcome
}

