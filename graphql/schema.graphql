  """
  accountPnlTimeseries(
    walletId: Int!
    interval: TimeseriesInterval!
    pagination: ForwardPaginationInput
  ): TimeseriesPointConnection!
  """
  Fetch the current status of a background image-validation job.

  Requires authentication — only the account that uploaded the image
