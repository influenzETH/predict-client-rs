"""
Granularity of timeseries data points.
"""
enum TimeseriesGranularity {
  _5m
  _1H
  _1D
  _7D
  _30D
}

"""
Interval options for the `accountPnlTimeseries` query.
"""
enum TimeseriesInterval {
  """
  Last 24 hours of data.
  """
  _1D
  """
  Last 7 days of data.
  """
  _7D
  """
  Last 30 days of data.
  """
  _30D
  """
  All available history (up to ~6 months).
  """
  MAX
}

"""
A single point in an account PnL timeseries.
"""
type TimeseriesPoint {
  """
  Unix timestamp (seconds since epoch).
  """
  x: Int!
  """
  PnL value in USD at this timestamp.
  """
  y: Float!
}

"""
A paginated connection over a list of nodes.
"""
type TimeseriesPointConnection {
  edges: [TimeseriesPointEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

"""
A single edge in a paginated connection, pairing a cursor with a node.
"""
type TimeseriesPointEdge {
  cursor: String!
  node: TimeseriesPoint!
}

scalar Timestamp

"""
Combined result of the trending query, returning the most actively traded
categories and markets over the recent window.

Trending rank is determined by 24 h trading volume. Both connections
share the same `pagination` argument.
"""
type TrendingResult {
  categories: CategoryConnection!
  markets: MarketConnection!
}

type TweetContextWithCategories {
  currentTweetCount: Int!
  """
  The X account profile associated with this username.
  """
  xAccount: XAccount
  """
  Time-series of tweet count data points bucketed by the requested granularity.
  """
  timeseries: [TweetCountDataPoint!]!
  """
  Categories linked to this X account, filtered by visibility unless a
  specific `categoryId` was requested.
  """
  categories: [TweetCountCategorySummary!]!
  """
  Start of the date window passed to `tweetContextByUsername`, as an ISO
  8601 UTC string. `null` when no start bound was supplied.
  """
  startsAt: String
  """
  End of the date window passed to `tweetContextByUsername`, as an ISO
  8601 UTC string. `null` when no end bound was supplied.
  """
  endsAt: String
  """
  Paginated X posts for this account within the date window supplied to
  `tweetContextByUsername`. Ordered newest-first. Cursor is the post ID.

  `typeIds` restricts results to posts with matching `type_id` values;
  omit to return all types.
  """
  xPosts(pagination: ForwardPaginationInput, typeIds: [Int!]): XPostConnection!
}

type TweetCountCategory implements Category {
  id: ID!
  slug: String!
  title: String!
  titleTranslationKey: String
  description: String
  imageUrl: String!
  mobileImageUrl: String!
  videoUri: String
  onChainId: BigIntString
  status: CategoryStatus!
  marketVariant: MarketVariant!
  resolutionProvider: ResolutionProvider!
  isNegRisk: Boolean!
  isYieldBearing: Boolean!
  decimalPrecision: Int!
  conversionFeeBps: Int
  featuredOrder: Int
  overrideImageUrl: String
  holdersCount: BigIntString!
  startsAt: DateTime!
  endsAt: DateTime
  createdAt: DateTime!
  isBookmarkedByUser: Boolean!
  statistics: CategoryStatistics!
  tags(pagination: ForwardPaginationInput): CategoryTagConnection!
  markets(filter: CategoryMarketsFilterInput, pagination: ForwardPaginationInput): MarketConnection!
  comments(
    pagination: ForwardPaginationInput
    sortBy: CommentSortBy
    onlyHolders: Boolean
  ): CommentConnection!
  similarCategories(pagination: ForwardPaginationInput): CategoryConnection!
  timeseries(filter: TimeseriesFilterInput!, pagination: ForwardPaginationInput): TimeseriesConnection!
  marketData: [TweetCountMarketData!]!
}

"""
Brief category summary returned inside tweet context responses.
"""
type TweetCountCategorySummary {
  id: ID!
  slug: String!
  title: String!
  imageUrl: String!
  startsAt: DateTime!
  endsAt: DateTime
  status: CategoryStatus!
}

"""
One time-bucket in a tweet count timeseries.
"""
type TweetCountDataPoint {
  timestamp: DateTime!
  count: Int!
}

"""
Granularity for the tweet count timeseries.
"""
enum TweetCountGranularity {
  """
  One bucket per hour.
  """
  HOURLY
  """
  One bucket per day.
  """
  DAILY
}

"""
Per-market tweet-count threshold data for a `TweetCountCategory`.
"""
type TweetCountMarketData {
  marketId: ID!
  minCount: Int!
  """
  `null` means unlimited (no upper bound).
  """
  maxCount: Int
  xAccountUsername: String!
}

"""
Category to remove from the authenticated account's bookmarks.
"""
input UnbookmarkCategoryInput {
  categorySlug: ID!
}

input UnlikeCommentInput {
  commentId: ID!
}

"""
Fields the authenticated account holder may update on their public profile.
All fields are optional — only non-`null` values are written.
"""
input UpdateAccountInput {
  """
  Display name. Must be unique, ≥ 1 char, ≤ 30 chars, no special characters.
  """
  name: String
  """
  Short bio, ≤ 250 chars.
  """
  description: String
  """
  Profile picture URL. Only `https://pbs.twimg.com/` origins are accepted.
  Pass `null` explicitly to clear the current profile picture.
  """
  imageUrl: String
  """
  Whether the profile picture should be publicly visible. Setting this to
  `false` hides the image without deleting it.
  """
  imageVisible: Boolean
  """
  Set to `true` to mark the onboarding flow as completed. Cannot be set to
  `false` once `true`. Requires a `name` to be set (either in this payload
  or already on the account).
  """
  hasOnboarded: Boolean
}

"""
Returned by `updateAccount`. The `account` field contains the updated
account object, or `null` if the update failed.
"""
type UpdateAccountMutationResponse {
  account: Account
}

"""
A multipart file upload
"""
scalar Upload

"""
Returned by `uploadProfilePicture`. Poll `imageValidationStatus(validationJobId: …)`
until the background validation job completes before treating the image
as publicly visible.
"""
type UploadProfilePictureMutationResponse {
  validationJobId: String!
}

"""
Returned by `validateDeposit`. Indicates whether the provided address has a
confirmed on-chain USDT deposit in the protocol's collateral vault.
"""
type ValidateDepositResponse {
  success: Boolean!
  """
  On-chain balance in the collateral asset's native units (USDT 1e6),
  serialised as a decimal string to avoid JavaScript precision loss.
  """
  balanceWei: BigIntString!
}

"""
Returned by `validateJwt`. `success` is `true` when the Bearer token is
valid and has not expired.
"""
type ValidateJwt {
  success: Boolean!
}

"""
Lifecycle state of a background image-validation job.

Clients should poll `imageValidationStatus` until the status is `COMPLETED`
or `FAILED` before surfacing the new image to other users.
"""
enum ValidationJobStatus {
  PENDING
  STARTED
  COMPLETED
  FAILED
}

scalar Void

"""
A position record returned by the `walletPositions` and root `positions`
queries.

The `id` is a synthetic `<walletId>-<rawId>` string; it is opaque and
should be treated as such by clients.
"""
type WalletPosition {
  id: ID!
  """
  Stable per-position identifier (used as the cursor key).
  """
  rawId: Int!
  """
  Wallet that holds this position.
  """
  walletId: Int!
  """
  Market this position is in.
  """
  marketId: Int!
  """
  Amount of outcome tokens held, as a decimal string to preserve precision.
  """
  amount: BigIntString!
}

"""
A paginated connection over a list of nodes.
"""
type WalletPositionConnection {
  edges: [WalletPositionEdge!]!
  pageInfo: PageInfo!
  totalCount: Int
}

"""
A single edge in a paginated connection, pairing a cursor with a node.
"""
type WalletPositionEdge {
  cursor: String!
  node: WalletPosition!
}

"""
Filter input for the `walletPositions` and `positions` queries.
"""
input WalletPositionFilter {
  """
  Wallet address to fetch positions for.
  """
  walletAddress: Address
  """
  Wallet ID to fetch positions for.
  """
  walletId: Int
}

"""
Weekly points breakdown entry for `Account.weeklyPointsHistory`.

`calculated` is `false` when the points pipeline has not yet completed
the calculation for this week (i.e. points are "TBD").
"""
type WeeklyPointsBreakdown {
  """
  1-based ISO week number.
  """
  week: Int!
  """
  Total points earned this week.
  """
  totalPoints: Float!
  """
  Subset of total points earned via referrals.
  """
  referralPoints: Float!
  """
  Whether the weekly calculation has been finalised.
  """
  calculated: Boolean!
}

"""
X account profile for a tracked Twitter/X user.
"""
type XAccount {
  id: ID!
  username: String!
  profileImageUrl: String
}

type XPost {
  id: ID!
  typeId: Int!
  createdAt: DateTime!
  content: String
}

"""
A paginated connection over a list of nodes.
"""
type XPostConnection {
  edges: [XPostEdge!]!
  pageInfo: PageInfo!
  totalCount: Int!
}

"""
A single edge in a paginated connection, pairing a cursor with a node.
"""
type XPostEdge {
  cursor: String!
  node: XPost!
}

"""
Per-account yield data from the protocol's fee-share yield programme.

Requires authentication. Use `claimDetails` to obtain the Merkle proof
required to submit an on-chain claim transaction.
"""
type Yield {
  """
  Timestamp of the next scheduled yield distribution, if known.
  """
  nextDistribution: DateTime
  """
  Cumulative USD value claimed by this wallet to date.
  """
  totalClaimedUsd: Float!
  """
  Current unclaimed balance in USD.
  """
  totalBalanceYieldUsd: Float!
  """
  Merkle proof details for the current claimable amount.
  """
  claimDetails: YieldClaimDetails
  """
  Paginated history of past yield claims, newest first.
  """
  history(pagination: ForwardPaginationInput): YieldClaimConnection!
}

"""
A historical yield-claim record.
"""
type YieldClaim {
  """
  USD value at the time of the claim.
  """
  amountUsd: Float!
  """
  Timestamp when the on-chain transaction confirmed.
  """
  claimedAt: DateTime!
  """
  On-chain transaction hash of the claim.
  """
  transactionHash: String!
}

"""
Paginated connection of yield-claim history entries.
"""
type YieldClaimConnection {
  edges: [YieldClaimEdge!]!
  pageInfo: PageInfo!
}

"""
Merkle-proof based yield claim details required to submit an on-chain claim.
"""
type YieldClaimDetails {
  """
  Cumulative claimable amount in Wei (1e18), decimal string.
  """
  cumulativeAmountWei: BigIntString!
  """
  USD value of the claimable amount.
  """
  amountUsd: Float!
  """
  Merkle proof siblings needed to verify the claim on-chain.
  """
  proof: [String!]!
}

"""
Edge wrapper for `YieldClaim` in a paginated connection.
"""
type YieldClaimEdge {
  cursor: String!
  node: YieldClaim!
}

"""
Indicates that an Input Object is a OneOf Input Object (and thus requires exactly one of its field be provided)
"""
directive @oneOf on INPUT_OBJECT

