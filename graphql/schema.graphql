"""
Composite mutation root assembled from domain-specific mutation objects.

Each domain owns its mutations:
- `AuthMutation` — login, logout, validateJwt
- `AccountMutation` — profile updates, referrals, GTM rewards
- `CategoryMutation` — bookmarks
- `OrderMutation` — order creation and cancellation
- `CommentMutation` — comment threads
- `BadgeMutation` — badge claims and display
- `OAuthMutation` — OAuth session lifecycle
"""
type Mutation {
  """
  Authenticate with an EIP-191 wallet signature. The `message` field must
  match the value returned by `message(timestamp: …)` for a recent timestamp.
  On success the returned JWT should be sent as `Authorization: Bearer <token>`
  on all subsequent authenticated requests.

  Tokens older than 24 hours are still valid but are downgraded to
  `READ_PROTECTED` scope — write operations will be rejected.
  """
  login(data: AccountLoginInput!): LoginMutationResponse!
  """
  Authenticate using a Privy session. Requires the `Privy-Authentication`
  header to be set to a valid Privy access token. On success issues a
  standard JWT for the address linked to the Privy session.
  """
  loginWithPrivy(data: PrivyAccountLoginInput!): LoginMutationResponse!
  """
  Check whether the `Authorization: Bearer` token on this request is still
  valid. Returns `success: true` when the token is valid and unexpired.
  """
  validateJwt: ValidateJwt!
  """
  Invalidate the current session. For JWT-based sessions the server has no
  token blacklist, so this is currently a no-op — clients should discard
  the token locally.
  """
  logout: Void
  """
  Update mutable fields on the authenticated account's profile. At least
  one field must be provided. Returns the updated account on success.
  """
  updateAccount(data: UpdateAccountInput!): UpdateAccountMutationResponse!
  """
  Link a Twitter/X account by exchanging an OAuth 2.0 PKCE authorisation
  code. When `TWITTER_CLIENT_ID` / `TWITTER_CLIENT_SECRET` are not
  configured the mutation is a no-op and returns `null`.
  """
  connectTwitter(data: ConnectTwitterInput!): Void
  """
  Remove the Twitter/X account link from the authenticated account.
  """
  disconnectTwitter: Void
  """
  Upload a new profile picture. Accepts a JPEG or PNG (≤ 5 MB) via
  multipart upload and enqueues an NSFW validation job. Poll
  `imageValidationStatus(validationJobId: …)` until the job completes
  before treating the image as publicly visible.
  """
  uploadProfilePicture(file: Upload!): UploadProfilePictureMutationResponse!
  """
  Attach an allocation wallet address to the authenticated account for
  rewards distribution in allocation rounds. Only one address can be active
  at a time; calling this again replaces the previous address.
  """
  linkAllocationWallet(address: Address!): Void
  """
  Mark the authenticated account's smart wallet as having completed the
  on-chain points-operator approval flow. Must be called before the rewards
  pipeline will distribute points to this smart wallet.
  """
  setSmartWalletPointsOperatorConfigured: Void
  """
  Record a referral relationship. The `referralCode` must belong to an
  existing account. This can only be called once per account; subsequent
  calls will fail if a referral is already set.
  """
  addReferrer(referralCode: String!): Void
  """
  Check whether the authenticated account has a sufficient USDT balance to
  unlock their referral code. If the threshold is met, a deposit-validation
  row is written so that subsequent `account.referralCode` queries return
  the code instead of `null`.

  Mirrors the TypeScript `MutationValidateDeposit` which calls
  `usdtContract.balanceOf(auth.value.address)` on-chain and then
  `accountRepo.upsertDepositValidation`.
  """
  validateDeposit(address: Address!): ValidateDepositResponse!
  """
  Set or update the tweet URL used for GTM (Go-To-Market) tweet-volume
  validation. The tweet is polled to compute engagement-based point
  rewards.
  """
  updateGtmTweetValidationUrl(tweetValidationUrl: String!): Void
  """
  Claim any pending GTM points that have accrued on the authenticated
  account. Sets `claimedAt` in `gtm.wallet`, which the rewards pipeline
  uses to mark this wallet's GTM reward as processed.
  """
  claimGtmPoints: Void
  """
  Save a category to the authenticated account's bookmark list.
  Bookmarks are visible in the `account.bookmarkedCategories` field.
  Bookmarking an already-bookmarked category is a no-op.
  """
  bookmarkCategory(data: BookmarkCategoryInput!): Void
  """
  Remove a category from the authenticated account's bookmark list.
  Unbookmarking a category that is not bookmarked is a no-op.
  """
  unbookmarkCategory(data: UnbookmarkCategoryInput!): Void
  """
  Submit a new limit or market order to the exchange.

  Performs full validation (EIP-712 hash, operator approval, and
  collateral / share balance) before persisting the order. If on-chain
  validation exceeds the configured timeout, the order is optimistically
  accepted and validated asynchronously.
  """
  createOrder(data: CreateOrderInput!): CreateOrderMutationResponse!
  """
  Cancel one or more open orders by their IDs. All IDs must belong to the
  authenticated account.
  """
  cancelOrder(data: CancelOrderInput!): Boolean!
  """
  Cancel all open orders the authenticated account holds within a category.
  A no-op if the account has no open orders in that category.
  """
  cancelOrdersByCategory(data: CancelOrdersByCategoryInput!): CancelOrdersByCategoryResponse!
  """
  Post a new comment or reply on a category's discussion thread.

  Requires authentication. Content must be 1–5 000 characters.
  Set `parentCommentId` to nest the comment as a reply under an existing
  thread; leave `null` for a top-level comment.
  """
  postComment(data: PostCommentInput!): Void
  """
  Soft-delete a comment posted by the authenticated account.

  Only the comment's author may delete it; attempts to delete another
  user's comment are silently ignored (no error is returned).
  """
  deleteComment(data: DeleteCommentInput!): Void
  """
  Like a comment. Liking a comment you have already liked is a no-op.
  """
  likeComment(data: LikeCommentInput!): Void
  """
  Remove a like from a comment. No-ops if the comment was not liked.
  """
  unlikeComment(data: UnlikeCommentInput!): Void
  """
  Flag a comment for moderator review. Duplicate reports from the same
  account are silently ignored.
  """
  reportComment(data: ReportCommentInput!): Void
  """
  Update the set of badges displayed on the authenticated account's public profile.
  """
  setDisplayedBadges(badgeIds: [ID!]!): [AccountBadge!]!
  """
  Attempt to claim one or more badges for the authenticated account.
  """
  claimBadges(badgeIds: [ID!]!): [AccountBadge!]!
  """
  Initiate an OAuth 2.0 authorisation session for a third-party client.
  """
  initiateOAuthSession(data: OAuthInitiateInput!): OAuthInitiateMutationResponse!
  """
  Revoke a previously granted OAuth session by client ID.
  """
  revokeOAuthSession(clientId: ID!): Void
}

