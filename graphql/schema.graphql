type Outcome {
  """
  Numeric database ID serialised as a string.
  """
  id: ID!
  """
  Zero-based position index within the market's outcome list.
  """
  index: Int!
  """
  Human-readable outcome label (e.g. `"Yes"`, `"No"`, `"Draw"`).
  """
  name: String!
  """
  Optional image URL displayed alongside this outcome in the UI.
  """
  imageUrl: String
  """
  Resolution status. `null` for unresolved markets, `Won` for the single
  winning outcome, `Lost` for all others after resolution.
  """
  status: OutcomeStatus
  """
  ERC-1155 token ID for this outcome's conditional token, as a decimal
  string. Errors if the outcome has not yet been deployed on-chain.
  """
  onChainId: BigIntString!
  """
  ISO 8601 UTC timestamp of when this outcome was created.
  """
  createdAt: DateTime!
  """
  Implied probability for this outcome as a percentage (0–100), rounded
  to two decimal places. Derived from `bidPriceInCurrency`; returns
  `null` when no live book is available for this market.
  """
  chancePercentage: Float
  """
  Best bid price for this outcome in the display currency.

  Underlying book prices are always quoted for the Yes side; the No
  side is returned as `1 - bestBid` so clients see a price consistent
  with how traders express No positions. Returns `null` when no live
  book is available for this market.
  """
  bidPriceInCurrency: Float
  """
  Best ask price for this outcome in the display currency.

  Underlying book prices are always quoted for the Yes side; the No
  side is returned as `1 - bestAsk`. Returns `null` when no live book
  is available for this market.
  """
  askPriceInCurrency: Float
  """
  Aggregate statistics for this outcome: total shares held and the USD
  value of all positions.

  `sharesCount` is summed across non-dust positions. `positionsValueUsd`
  is approximated as `sharesCount × bestBid`; returns `0.0` when no live
  book is available for this market.
  """
  statistics: OutcomeStatistics!
  """
  Paginated wallet positions for this outcome, ordered by share amount descending.
  """
  positions(pagination: ForwardPaginationInput): PositionConnection!
}

